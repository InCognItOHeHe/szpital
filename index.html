<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Analizy Kontuzji — VM Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --bg2: #181b24;
            --border: #2a2f45;
            --accent: #ef4444;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1150px;
        }

        h1 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        .controls {
            background: var(--bg2);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-block { display: flex; flex-direction: column; gap: 5px; }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
        }

        input[type="file"] {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            max-width: 330px;
        }

        select, button {
            background: var(--bg);
            color: white;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover, select:hover, input[type="file"]:hover { border-color: var(--accent); }

        .hint {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
            flex-basis: 100%;
        }

        .country-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg2);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        th {
            background: #1e2130;
            padding: 15px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
        }

        th:hover { background: #2a2f45; color: #fff; }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        tr:hover { background: rgba(255,255,255,0.02); }

        .pos-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 11px;
            color: #000;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .date-col { font-family: monospace; color: var(--accent); font-weight: bold; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-style: italic;
            background: var(--bg2);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        #stats {
            font-weight: bold;
            color: var(--muted);
            border-left: 1px solid var(--border);
            padding-left: 20px;
            margin-left: auto;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚑 Szpital Ligowy - Analiza</h1>

    <div class="controls">
        <div class="control-block">
            <label>1. Wybierz pliki CSV, jeśli automatyczne ładowanie nie działa:</label>
            <input type="file" id="csvFiles" accept=".csv" multiple>
        </div>

        <div class="control-block">
            <label>2. Filtruj kraj:</label>
            <select id="countryFilter">
                <option value="ALL">Wszystkie kraje</option>
            </select>
        </div>

        <div class="control-block">
            <label>3. Filtruj pozycję:</label>
            <select id="posFilter">
                <option value="ALL">Wszystkie pozycje</option>
                <option value="A">Atakujący (A)</option>
                <option value="P">Przyjmujący (P)</option>
                <option value="Ś">Środkowy (Ś)</option>
                <option value="R">Rozgrywający (R)</option>
                <option value="L">Libero (L)</option>
            </select>
        </div>

        <button id="reloadBtn" type="button" title="Ponownie pobierz pliki CSV z folderu obok HTML">Odśwież CSV</button>

        <div id="stats"></div>
        <div class="hint" id="loadInfo">Ładowanie danych z plików CSV...</div>
    </div>

    <table id="injuryTable" style="display:none;">
        <thead>
            <tr>
                <th onclick="sortTable('Kraj')" title="Sortuj po kraju">Kraj ↕</th>
                <th onclick="sortTable('ID Ligi')" title="Sortuj po lidze">Liga ↕</th>
                <th onclick="sortTable('Klub')" title="Sortuj po nazwie klubu">Klub ↕</th>
                <th onclick="sortTable('Zawodnik')" title="Sortuj alfabetycznie zawodników">Zawodnik ↕</th>
                <th onclick="sortTable('Powrót do gry')" title="Sortuj po dacie wyzdrowienia">Data powrotu ↕</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div id="noData" class="empty-state">Brak danych. Pliki CSV powinny być w tym samym folderze co HTML albo wgrane ręcznie powyżej.</div>
</div>

<script>
    let rawData = [];
    let sortOrder = 1;
    let currentSortKey = 'Powrót do gry';

    const posColors = { 'R': '#4f7cff', 'Ś': '#f59e0b', 'P': '#22c55e', 'A': '#ef4444', 'L': '#cbd5e1' };

    // Pliki ładowane automatycznie z tego samego folderu co HTML.
    // Jeśli dodasz kolejny kraj, dopisz tutaj nazwę pliku i mapowanie w COUNTRY_BY_FILE.
    const CSV_FILES = [
        'szpitalbra.csv',
        'szpitalbul.csv',
        'szpitalfra.csv',
        'szpitalnie.csv',
        'szpitalint.csv',
        'szpitalwlo.csv',
        'szpitalpor.csv',
        'szpitaltur.csv',
        'szpitalusa.csv'
    ];

    const COUNTRY_BY_FILE = {
        'szpitalbra.csv': 'Brazylia',
        'szpitalbul.csv': 'Bułgaria',
        'szpitalfra.csv': 'Francja',
        'szpitalnie.csv': 'Niemcy',
        'szpitalint.csv': 'Międzynarodowe',
        'szpitalwlo.csv': 'Włochy',
        'szpitalpor.csv': 'Portugalia',
        'szpitaltur.csv': 'Turcja',
        'szpitalusa.csv': 'USA'
    };

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('csvFiles').addEventListener('change', handleManualFiles);
        document.getElementById('countryFilter').addEventListener('change', renderTable);
        document.getElementById('posFilter').addEventListener('change', renderTable);
        document.getElementById('reloadBtn').addEventListener('click', loadDefaultCsvFiles);
        loadDefaultCsvFiles();
    });

    async function loadDefaultCsvFiles() {
        setLoadInfo('Ładowanie danych z plików CSV...');
        rawData = [];

        const parsedFiles = await Promise.all(CSV_FILES.map(async filename => {
            try {
                const response = await fetch(filename + '?v=' + Date.now());
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                return parseCsvText(text, filename);
            } catch (error) {
                console.warn(`Nie udało się wczytać ${filename}:`, error);
                return { filename, rows: [], failed: true };
            }
        }));

        const successful = parsedFiles.filter(file => !file.failed);
        rawData = parsedFiles.flatMap(file => file.rows);
        finishLoading(successful.length, CSV_FILES.length, 'auto');
    }

    function handleManualFiles(event) {
        const files = Array.from(event.target.files || []);
        if (!files.length) return;

        setLoadInfo('Wczytywanie ręcznie wybranych plików CSV...');
        rawData = [];

        Promise.all(files.map(file => new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => resolve(parseCsvText(e.target.result, file.name));
            reader.onerror = () => resolve({ filename: file.name, rows: [], failed: true });
            reader.readAsText(file, 'UTF-8');
        }))).then(parsedFiles => {
            const successful = parsedFiles.filter(file => !file.failed);
            rawData = parsedFiles.flatMap(file => file.rows);
            finishLoading(successful.length, files.length, 'manual');
        });
    }

    function parseCsvText(text, filename) {
        const parsed = Papa.parse(text, {
            header: true,
            skipEmptyLines: true,
            transformHeader: header => header.trim()
        });

        const country = getCountryFromFilename(filename);
        const rows = (parsed.data || [])
            .filter(row => row && Object.values(row).some(value => String(value || '').trim() !== ''))
            .map(row => ({
                ...row,
                'Kraj': country,
                '_sourceFile': filename
            }));

        return { filename, rows, failed: false };
    }

    function finishLoading(successfulCount, totalCount, mode) {
        rawData.sort(compareByKey('Powrót do gry', 1));
        sortOrder = 1;
        currentSortKey = 'Powrót do gry';
        buildCountryFilter();
        renderTable();

        if (rawData.length === 0) {
            setLoadInfo('Nie udało się automatycznie wczytać CSV. Otwórz HTML przez lokalny serwer albo wybierz kilka plików CSV ręcznie w polu powyżej.');
            return;
        }

        const modeText = mode === 'manual' ? 'ręcznie wybranych' : 'automatycznie znalezionych';
        setLoadInfo(`Wczytano ${rawData.length} rekordów z ${successfulCount}/${totalCount} ${modeText} plików CSV.`);
    }

    function getCountryFromFilename(filename) {
        const cleanName = filename.split(/[\\/]/).pop().toLowerCase();
        if (COUNTRY_BY_FILE[cleanName]) return COUNTRY_BY_FILE[cleanName];

        // Awaryjne rozpoznawanie, gdy plik ma dopisek, np. szpitalfra_2.csv.
        if (cleanName.includes('bra')) return 'Brazylia';
        if (cleanName.includes('bul')) return 'Bułgaria';
        if (cleanName.includes('fra')) return 'Francja';
        if (cleanName.includes('nie')) return 'Niemcy';
        if (cleanName.includes('int')) return 'Międzynarodowe';
        if (cleanName.includes('wlo')) return 'Włochy';
        if (cleanName.includes('por')) return 'Portugalia';
        if (cleanName.includes('tur')) return 'Turcja';
        if (cleanName.includes('usa')) return 'USA';

        return filename.replace(/\.csv$/i, '');
    }

    function buildCountryFilter() {
        const select = document.getElementById('countryFilter');
        const previousValue = select.value;
        const countries = [...new Set(rawData.map(row => row.Kraj).filter(Boolean))]
            .sort((a, b) => a.localeCompare(b, 'pl'));

        select.innerHTML = '<option value="ALL">Wszystkie kraje</option>';
        countries.forEach(country => {
            const option = document.createElement('option');
            option.value = country;
            option.textContent = country;
            select.appendChild(option);
        });

        select.value = countries.includes(previousValue) ? previousValue : 'ALL';
    }

    function renderTable() {
        const countryFilter = document.getElementById('countryFilter').value;
        const posFilter = document.getElementById('posFilter').value;
        const tbody = document.getElementById('tableBody');
        const table = document.getElementById('injuryTable');
        const noData = document.getElementById('noData');

        tbody.innerHTML = '';

        const filtered = rawData.filter(row => {
            const countryMatch = countryFilter === 'ALL' || row.Kraj === countryFilter;
            const posMatch = posFilter === 'ALL' || row.Pozycja === posFilter;
            return countryMatch && posMatch;
        });

        if (filtered.length > 0) {
            table.style.display = 'table';
            noData.style.display = 'none';
            updateStats(filtered);

            filtered.forEach(row => {
                const tr = document.createElement('tr');
                const color = posColors[row.Pozycja] || '#64748b';
                const pozycja = row.Pozycja && row.Pozycja !== '?' ? row.Pozycja : '?';
                const posBadge = pozycja !== '?'
                    ? `<span class="pos-badge" style="background:${color}">${escapeHtml(pozycja)}</span>`
                    : `<span class="pos-badge" style="background:transparent; color:var(--muted)">?</span>`;

                tr.innerHTML = `
                    <td><span class="country-badge">${escapeHtml(row.Kraj || '-')}</span></td>
                    <td style="color:var(--muted)">${escapeHtml(row['ID Ligi'] || '-')}</td>
                    <td style="font-weight:bold">${escapeHtml(row.Klub || '-')}</td>
                    <td>
                        <div style="display:flex; align-items:center;">
                            ${posBadge}
                            <b>${escapeHtml(row.Zawodnik || '-')}</b>
                        </div>
                    </td>
                    <td class="date-col">${escapeHtml(row['Powrót do gry'] || '-')}</td>
                `;
                tbody.appendChild(tr);
            });
        } else {
            table.style.display = 'none';
            noData.style.display = 'block';
            noData.innerText = rawData.length
                ? 'Brak zawodników spełniających wybrane kryteria.'
                : 'Brak danych. Pliki CSV powinny być w tym samym folderze co HTML albo wgrane ręcznie powyżej.';
            document.getElementById('stats').innerText = 'Pacjentów: 0';
        }
    }

    function updateStats(filtered) {
        const selectedCountries = new Set(filtered.map(row => row.Kraj).filter(Boolean)).size;
        document.getElementById('stats').innerText = `Pacjentów: ${filtered.length} | Kraje: ${selectedCountries}`;
    }

    function sortTable(key) {
        if (currentSortKey === key) {
            sortOrder *= -1;
        } else {
            sortOrder = 1;
            currentSortKey = key;
        }

        rawData.sort(compareByKey(key, sortOrder));
        renderTable();
    }

    function compareByKey(key, order) {
        return (a, b) => {
            const valA = String(a[key] || '');
            const valB = String(b[key] || '');
            return valA.localeCompare(valB, 'pl', { numeric: true, sensitivity: 'base' }) * order;
        };
    }

    function setLoadInfo(text) {
        document.getElementById('loadInfo').innerText = text;
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }
</script>

</body>
</html>
